name: Build Windows EXE

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Paketleri Yükle
        run: npm install

      - name: EXE Oluştur
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: EXE'yi Yükle
        uses: actions/upload-artifact@v4
        with:
          name: PetCare-Setup
          path: dist/*.exe
          retention-days: 30
