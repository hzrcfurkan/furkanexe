<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bağlantı Yok</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f23;
    display: flex; align-items: center; justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #fff;
  }
  .box { text-align: center; max-width: 400px; padding: 40px; }
  .icon { font-size: 64px; margin-bottom: 24px; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: #f87171; }
  p  { font-size: 14px; color: #9ca3af; line-height: 1.6; margin-bottom: 32px; }
  button {
    background: #7c3aed;
    color: #fff;
    border: none;
    padding: 12px 32px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #6d28d9; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">📡</div>
  <h1>İnternet Bağlantısı Yok</h1>
  <p>PetCare'e bağlanmak için internet gereklidir.<br>Bağlantınızı kontrol edip tekrar deneyin.</p>
  <button onclick="location.reload()">🔄 Tekrar Dene</button>
</div>
</body>
</html>
