<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 420px; height: 280px;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Segoe UI', sans-serif;
    -webkit-app-region: drag;
  }
  .card {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
    border-radius: 20px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    background: rgba(139,92,246,0.15);
    border-radius: 50%;
    top: -100px; right: -80px;
  }
  .logo {
    font-size: 52px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    animation: bounce 1s ease infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-6px); }
  }
  .brand { text-align: center; }
  .brand h1 { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: 1px; }
  .brand p  { font-size: 12px; color: rgba(196,181,253,0.8); margin-top: 4px; }
  .loader {
    width: 160px; height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    overflow: hidden;
  }
  .loader-bar {
    height: 100%;
    background: linear-gradient(90deg, #a78bfa, #7c3aed);
    border-radius: 999px;
    animation: load 1.8s ease-in-out forwards;
  }
  @keyframes load {
    0%   { width: 0%; }
    60%  { width: 75%; }
    100% { width: 100%; }
  }
  .version { position: absolute; bottom: 14px; font-size: 10px; color: rgba(196,181,253,0.5); }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🐾</div>
  <div class="brand">
    <h1>PetCare</h1>
    <p>Veteriner Klinik Yönetim Sistemi</p>
  </div>
  <div class="loader"><div class="loader-bar"></div></div>
  <div class="version">v1.0.0</div>
</div>
</body>
</html>
